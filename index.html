<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>High Resolution Particle Art</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #ffffff;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// Nhận diện thiết bị
const isMobile = window.innerWidth < 768;

// Cấu hình chất lượng cao
const CONFIG = {
    gap: isMobile ? 1.2 : 0.8,          // Giảm gap để tăng mật độ
    maxParticles: isMobile ? 40000 : 120000,
    mouseRadius: isMobile ? 60 : 90,
    particleSize: isMobile ? 0.9 : 0.6,
    returnSpeed: 0.18,
    fps: isMobile ? 30 : 60
};

// Độ phân giải màn hình
const DPR = Math.min(window.devicePixelRatio || 1, 2);

// Thiết lập canvas
function resizeCanvas() {
    const width = window.innerWidth;
    const height = window.innerHeight;

    canvas.width = width * DPR;
    canvas.height = height * DPR;

    canvas.style.width = width + "px";
    canvas.style.height = height + "px";

    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resizeCanvas();

// Theo dõi chuột và cảm ứng
const mouse = {
    x: null,
    y: null,
    radius: CONFIG.mouseRadius
};

function setMousePosition(x, y) {
    const rect = canvas.getBoundingClientRect();
    mouse.x = x - rect.left;
    mouse.y = y - rect.top;
}

window.addEventListener("mousemove", e => {
    setMousePosition(e.clientX, e.clientY);
});

window.addEventListener("mouseout", () => {
    mouse.x = null;
    mouse.y = null;
});

window.addEventListener("touchmove", e => {
    setMousePosition(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: true });

window.addEventListener("touchend", () => {
    mouse.x = null;
    mouse.y = null;
});

// Lớp Particle
class Particle {
    constructor(x, y) {
        this.baseX = x;
        this.baseY = y;
        this.x = Math.random() * canvas.width / DPR;
        this.y = Math.random() * canvas.height / DPR;
        this.size = CONFIG.particleSize;
        this.vx = (Math.random() - 0.5) * 1.2;
        this.vy = (Math.random() - 0.5) * 1.2;
    }

    draw() {
        ctx.fillRect(this.x, this.y, this.size, this.size);
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;

        if (this.x <= 0 || this.x >= canvas.width / DPR) this.vx *= -1;
        if (this.y <= 0 || this.y >= canvas.height / DPR) this.vy *= -1;

        if (mouse.x !== null && mouse.y !== null) {
            const dxMouse = mouse.x - this.x;
            const dyMouse = mouse.y - this.y;
            const distance = Math.sqrt(dxMouse * dxMouse + dyMouse * dyMouse);

            if (distance < mouse.radius) {
                const dx = this.baseX - this.x;
                const dy = this.baseY - this.y;

                this.x += dx * CONFIG.returnSpeed;
                this.y += dy * CONFIG.returnSpeed;

                this.vx *= 0.9;
                this.vy *= 0.9;

                if (Math.abs(dx) < 0.3 && Math.abs(dy) < 0.3) {
                    this.x = this.baseX;
                    this.y = this.baseY;
                }
            }
        }

        this.draw();
    }
}

let particlesArray = [];
const image = new Image();
image.src = "image.png";

function initParticles() {
    particlesArray = [];

    const width = canvas.width / DPR;
    const height = canvas.height / DPR;

    const tempCanvas = document.createElement("canvas");
    const tempCtx = tempCanvas.getContext("2d");

    tempCanvas.width = width;
    tempCanvas.height = height;

    // Căn giữa ảnh
    const scale = Math.min(
        width / image.width,
        height / image.height
    ) * 0.85;

    const imgWidth = image.width * scale;
    const imgHeight = image.height * scale;

    const offsetX = (width - imgWidth) / 2;
    const offsetY = (height - imgHeight) / 2;

    tempCtx.drawImage(
        image,
        offsetX,
        offsetY,
        imgWidth,
        imgHeight
    );

    const imageData = tempCtx.getImageData(0, 0, width, height).data;

    for (let y = 0; y < height; y += CONFIG.gap) {
        for (let x = 0; x < width; x += CONFIG.gap) {
            const index = (Math.floor(y) * width + Math.floor(x)) * 4;

            const r = imageData[index];
            const g = imageData[index + 1];
            const b = imageData[index + 2];
            const alpha = imageData[index + 3];

            const brightness = (r + g + b) / 3;

            if (
                particlesArray.length < CONFIG.maxParticles &&
                alpha > 128 &&
                brightness < 220
            ) {
                particlesArray.push(new Particle(x, y));
            }
        }
    }

    console.log("Số lượng vật thể:", particlesArray.length);
}

image.onload = () => {
    initParticles();
    animate(0);
};

image.onerror = () => {
    alert("Không tìm thấy file image.png!");
};

// Giới hạn FPS
let lastTime = 0;
const frameInterval = 1000 / CONFIG.fps;

function animate(timestamp) {
    requestAnimationFrame(animate);

    if (timestamp - lastTime < frameInterval) return;
    lastTime = timestamp;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "black";

    for (let particle of particlesArray) {
        particle.update();
    }
}

window.addEventListener("resize", () => {
    resizeCanvas();
    if (image.complete) initParticles();
});
</script>
</body>
</html>
