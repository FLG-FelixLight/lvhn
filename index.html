<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Interactive Particle Image</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #ffffff; }
        canvas { display: block; touch-action: none; }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);

const CONFIG = {
    gap: isMobile ? 3 : 1,
    maxParticles: isMobile ? 15000 : 80000,
    mouseRadius: isMobile ? 50 : 80,
    particleSize: isMobile ? 1.5 : 0.8,
    returnSpeed: 0.1
};

const DPR = Math.min(window.devicePixelRatio || 1, 2);
let width, height, particlesArray = [];
const mouse = { x: null, y: null, radius: CONFIG.mouseRadius };

function resizeCanvas() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width * DPR;
    canvas.height = height * DPR;
    canvas.style.width = width + "px";
    canvas.style.height = height + "px";
    ctx.scale(DPR, DPR);
}
resizeCanvas();

function handleMove(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    mouse.x = clientX - rect.left;
    mouse.y = clientY - rect.top;
}

window.addEventListener("mousemove", handleMove);
window.addEventListener("touchmove", handleMove, { passive: false });
window.addEventListener("touchend", () => { mouse.x = null; mouse.y = null; });
window.addEventListener("mouseout", () => { mouse.x = null; mouse.y = null; });

class Particle {
    constructor(x, y) {
        this.baseX = x;
        this.baseY = y;
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.size = CONFIG.particleSize;
        this.vx = (Math.random() - 0.5) * 1.5;
        this.vy = (Math.random() - 0.5) * 1.5;
        this.fixed = false;
    }

    update() {
        if (!this.fixed) {
            this.x += this.vx;
            this.y += this.vy;
            if (this.x <= 0 || this.x >= width) this.vx *= -1;
            if (this.y <= 0 || this.y >= height) this.vy *= -1;
        }

        if (mouse.x !== null) {
            let dx = mouse.x - this.x;
            let dy = mouse.y - this.y;
            if (Math.sqrt(dx*dx + dy*dy) < mouse.radius) {
                this.x += (this.baseX - this.x) * CONFIG.returnSpeed;
                this.y += (this.baseY - this.y) * CONFIG.returnSpeed;
                if (Math.abs(this.baseX - this.x) < 0.5 && Math.abs(this.baseY - this.y) < 0.5) {
                    this.x = this.baseX; this.y = this.baseY;
                    this.fixed = true;
                }
            }
        }
        ctx.fillRect(this.x, this.y, this.size, this.size);
    }
}

const image = new Image();
image.src = "image.png"; 
image.onload = () => { initParticles(); animate(); };

function initParticles() {
    particlesArray = [];
    const tempCanvas = document.createElement("canvas");
    const tCtx = tempCanvas.getContext("2d");
    tempCanvas.width = width; tempCanvas.height = height;

    const scale = Math.min(width/image.width, height/image.height) * 0.8;
    const iw = image.width * scale, ih = image.height * scale;
    const ox = (width - iw)/2, oy = (height - ih)/2;

    tCtx.drawImage(image, ox, oy, iw, ih);
    const data = tCtx.getImageData(0, 0, width, height).data;

    for (let y = 0; y < height; y += CONFIG.gap) {
        for (let x = 0; x < width; x += CONFIG.gap) {
            const i = (Math.floor(y) * width + Math.floor(x)) * 4;
            if (data[i + 3] > 128 && (data[i]+data[i+1]+data[i+2])/3 < 200) {
                if (particlesArray.length < CONFIG.maxParticles) particlesArray.push(new Particle(x, y));
            }
        }
    }
}

function animate() {
    ctx.clearRect(0, 0, width, height);
    ctx.fillStyle = "black";
    for (let p of particlesArray) p.update();
    requestAnimationFrame(animate);
}

window.addEventListener("resize", () => { resizeCanvas(); initParticles(); });
</script>
</body>
</html>
