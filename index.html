<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Particle Image FIX MOBILE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    * { margin:0; padding:0; box-sizing:border-box; }

    html, body {
        width:100%;
        height:100%;
        overflow:hidden;
        background:#fff;
        touch-action:none;
    }

    canvas { display:block; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const isMobile = /Mobi|Android/i.test(navigator.userAgent);

const CONFIG = {
    gap: isMobile ? 2 : 1,
    maxParticles: isMobile ? 25000 : 90000,
    radius: isMobile ? 70 : 90,
    size: isMobile ? 1.2 : 0.8,
    speed: 0.15
};

let width, height;
let particles = [];

const DPR = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
    width = window.innerWidth;
    height = window.innerHeight;

    canvas.width = width * DPR;
    canvas.height = height * DPR;
    canvas.style.width = width + "px";
    canvas.style.height = height + "px";

    ctx.setTransform(DPR,0,0,DPR,0,0);
}
resize();

// =======================
// 💥 INTERACTION PULSE
// =======================
let interaction = {
    x: null,
    y: null,
    active: false
};

function triggerInteraction(x,y){
    interaction.x = x;
    interaction.y = y;
    interaction.active = true;

    // 🔥 chỉ active 300ms
    setTimeout(()=> interaction.active = false, 300);
}

// PC
window.addEventListener("mousemove", e=>{
    triggerInteraction(e.clientX, e.clientY);
});

// MOBILE
canvas.addEventListener("touchstart", e=>{
    e.preventDefault();
    const t = e.touches[0];
    triggerInteraction(t.clientX, t.clientY);
}, { passive:false });

// =======================
// PARTICLE
// =======================
class Particle {
    constructor(x,y){
        this.baseX = x;
        this.baseY = y;
        this.x = Math.random()*width;
        this.y = Math.random()*height;
        this.vx = (Math.random()-0.5)*0.8;
        this.vy = (Math.random()-0.5)*0.8;
        this.fixed = false;
    }

    draw(){
        ctx.fillRect(this.x,this.y,CONFIG.size,CONFIG.size);
    }

    update(){
        // FIXED = đứng yên tuyệt đối
        if(this.fixed){
            this.x = this.baseX;
            this.y = this.baseY;
            this.draw();
            return;
        }

        // random move
        this.x += this.vx;
        this.y += this.vy;

        if(this.x<=0||this.x>=width) this.vx*=-1;
        if(this.y<=0||this.y>=height) this.vy*=-1;

        // interaction pulse
        if(interaction.active){
            const dx = interaction.x - this.x;
            const dy = interaction.y - this.y;

            if(dx*dx + dy*dy < CONFIG.radius*CONFIG.radius){
                const bx = this.baseX - this.x;
                const by = this.baseY - this.y;

                this.x += bx * CONFIG.speed;
                this.y += by * CONFIG.speed;

                // 🔥 SNAP + LOCK
                if(Math.abs(bx)<0.1 && Math.abs(by)<0.1){
                    this.fixed = true;
                    this.x = this.baseX;
                    this.y = this.baseY;
                    this.vx = 0;
                    this.vy = 0;
                }
            }
        }

        this.draw();
    }
}

// =======================
// IMAGE
// =======================
const img = new Image();
img.src = "image.png";

function init(){
    particles = [];

    const temp = document.createElement("canvas");
    const tctx = temp.getContext("2d");

    temp.width = width;
    temp.height = height;

    const scale = Math.min(width/img.width, height/img.height)*0.8;

    const w = img.width*scale;
    const h = img.height*scale;

    const ox = (width-w)/2;
    const oy = (height-h)/2;

    tctx.drawImage(img,ox,oy,w,h);

    const data = tctx.getImageData(0,0,width,height).data;

    for(let y=0;y<height;y+=CONFIG.gap){
        for(let x=0;x<width;x+=CONFIG.gap){

            const i = (y*width + x)*4;
            const a = data[i+3];
            const bright = (data[i]+data[i+1]+data[i+2])/3;

            if(a>128 && bright<200 && particles.length<CONFIG.maxParticles){
                particles.push(new Particle(x,y));
            }
        }
    }
}

img.onload = ()=>{
    init();
    animate();
};

// =======================
// LOOP
// =======================
function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "black";

    for(let p of particles){
        p.update();
    }

    requestAnimationFrame(animate);
}

// resize
window.addEventListener("resize", ()=>{
    resize();
    if(img.complete) init();
});
</script>
</body>
</html>
