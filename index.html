<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Interactive Particle Image</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #ffffff;
    }

    canvas {
        display: block;
    }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);

const CONFIG = {
    gap: isMobile ? 2 : 1,
    maxParticles: isMobile ? 25000 : 90000,
    mouseRadius: isMobile ? 70 : 90,
    particleSize: isMobile ? 1.2 : 0.8,
    returnSpeed: 0.15
};

const DPR = Math.min(window.devicePixelRatio || 1, 2);

let width, height;
let particlesArray = [];

function resizeCanvas() {
    width = window.innerWidth;
    height = window.innerHeight;

    canvas.width = width * DPR;
    canvas.height = height * DPR;

    canvas.style.width = width + "px";
    canvas.style.height = height + "px";

    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resizeCanvas();

// =======================
// INTERACTION FIX
// =======================
const mouse = {
    x: null,
    y: null,
    radius: CONFIG.mouseRadius,
    isInteracting: false
};

function setMousePosition(x, y) {
    const rect = canvas.getBoundingClientRect();
    mouse.x = x - rect.left;
    mouse.y = y - rect.top;
}

// PC
window.addEventListener("mousemove", e => {
    mouse.isInteracting = true;
    setMousePosition(e.clientX, e.clientY);
});

window.addEventListener("mouseout", () => {
    mouse.isInteracting = false;
    mouse.x = null;
    mouse.y = null;
});

// MOBILE
window.addEventListener("touchstart", e => {
    mouse.isInteracting = true;
    setMousePosition(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: true });

window.addEventListener("touchmove", e => {
    setMousePosition(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: true });

window.addEventListener("touchend", () => {
    mouse.isInteracting = false;
    mouse.x = null;
    mouse.y = null;
});

// =======================
// PARTICLE
// =======================
class Particle {
    constructor(x, y) {
        this.baseX = x;
        this.baseY = y;
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.size = CONFIG.particleSize;
        this.vx = (Math.random() - 0.5) * 0.8;
        this.vy = (Math.random() - 0.5) * 0.8;
        this.fixed = false;
    }

    draw() {
        ctx.fillRect(this.x, this.y, this.size, this.size);
    }

    update() {
       // Nếu đã fixed → đứng yên luôn
       if (this.fixed) {
           this.draw();
           return;
       }
   
       // Random movement
       this.x += this.vx;
       this.y += this.vy;
   
       if (this.x <= 0 || this.x >= width) this.vx *= -1;
       if (this.y <= 0 || this.y >= height) this.vy *= -1;
   
       // Interaction
       if (mouse.x !== null && mouse.y !== null) {
           const dxMouse = mouse.x - this.x;
           const dyMouse = mouse.y - this.y;
           const distance = Math.sqrt(dxMouse * dxMouse + dyMouse * dyMouse);
   
           if (distance < mouse.radius) {
               const dx = this.baseX - this.x;
               const dy = this.baseY - this.y;
   
               this.x += dx * CONFIG.returnSpeed;
               this.y += dy * CONFIG.returnSpeed;
   
               // FIX CỨNG
               if (Math.abs(dx) < 0.15 && Math.abs(dy) < 0.15) {
                   this.x = this.baseX;
                   this.y = this.baseY;
                   this.fixed = true; // khóa vĩnh viễn
               }
           }
       }
   
       this.draw();
   }
}

// =======================
// IMAGE
// =======================
const image = new Image();
image.src = "image.png";

function initParticles() {
    particlesArray = [];

    const tempCanvas = document.createElement("canvas");
    const tempCtx = tempCanvas.getContext("2d");

    tempCanvas.width = width;
    tempCanvas.height = height;

    const scale = Math.min(
        width / image.width,
        height / image.height
    ) * 0.8;

    const imgWidth = image.width * scale;
    const imgHeight = image.height * scale;

    const offsetX = (width - imgWidth) / 2;
    const offsetY = (height - imgHeight) / 2;

    tempCtx.drawImage(image, offsetX, offsetY, imgWidth, imgHeight);

    const imageData = tempCtx.getImageData(0, 0, width, height).data;

    for (let y = 0; y < height; y += CONFIG.gap) {
        for (let x = 0; x < width; x += CONFIG.gap) {
            const index = (y * width + x) * 4;

            const r = imageData[index];
            const g = imageData[index + 1];
            const b = imageData[index + 2];
            const alpha = imageData[index + 3];

            const brightness = (r + g + b) / 3;

            if (
                alpha > 128 &&
                brightness < 200 &&
                particlesArray.length < CONFIG.maxParticles
            ) {
                particlesArray.push(new Particle(x, y));
            }
        }
    }

    console.log("Particles:", particlesArray.length);
}

image.onload = () => {
    initParticles();
    animate();
};

image.onerror = () => {
    alert("Không tìm thấy image.png");
};

// =======================
// ANIMATE
// =======================
function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "black";

    for (let particle of particlesArray) {
        particle.update();
    }

    requestAnimationFrame(animate);
}

// resize
window.addEventListener("resize", () => {
    resizeCanvas();
    if (image.complete) initParticles();
});
</script>
</body>
</html>
