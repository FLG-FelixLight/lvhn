<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Fixed Particle Image</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #ffffff; }
        canvas { display: block; touch-action: none; }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);

const CONFIG = {
    gap: isMobile ? 3 : 2,
    maxParticles: isMobile ? 15000 : 80000,
    mouseRadius: isMobile ? 60 : 100,
    particleSize: isMobile ? 1.2 : 0.8,
    returnSpeed: 0.15 // Tăng tốc độ hút để dễ dính
};

const DPR = Math.min(window.devicePixelRatio || 1, 2);
let width, height, particlesArray = [];
const mouse = { x: null, y: null, radius: CONFIG.mouseRadius };

function resizeCanvas() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width * DPR;
    canvas.height = height * DPR;
    canvas.style.width = width + "px";
    canvas.style.height = height + "px";
    ctx.scale(DPR, DPR);
}
resizeCanvas();

function handleMove(e) {
    const rect = canvas.getBoundingClientRect();
    const pos = e.touches ? e.touches[0] : e;
    mouse.x = pos.clientX - rect.left;
    mouse.y = pos.clientY - rect.top;
}

window.addEventListener("mousemove", handleMove);
window.addEventListener("touchmove", (e) => { handleMove(e); e.preventDefault(); }, { passive: false });
window.addEventListener("touchend", () => { mouse.x = null; mouse.y = null; });

class Particle {
    constructor(x, y) {
        this.baseX = x;
        this.baseY = y;
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.size = CONFIG.particleSize;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 2;
        this.fixed = false;
    }

    update() {
        if (this.fixed) {
            ctx.fillRect(this.baseX, this.baseY, this.size, this.size);
            return; // Dừng mọi tính toán nếu đã về vị trí
        }

        // Di chuyển tự do
        this.x += this.vx;
        this.y += this.vy;
        if (this.x <= 0 || this.x >= width) this.vx *= -1;
        if (this.y <= 0 || this.y >= height) this.vy *= -1;

        // Kiểm tra tương tác chuột/tay
        if (mouse.x !== null) {
            let dx = mouse.x - this.x;
            let dy = mouse.y - this.y;
            let distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < mouse.radius) {
                // Hút về vị trí gốc
                this.x += (this.baseX - this.x) * CONFIG.returnSpeed;
                this.y += (this.baseY - this.y) * CONFIG.returnSpeed;

                // Kiểm tra độ khớp để khóa vị trí vĩnh viễn
                if (Math.abs(this.x - this.baseX) < 0.2 && Math.abs(this.y - this.baseY) < 0.2) {
                    this.x = this.baseX;
                    this.y = this.baseY;
                    this.fixed = true;
                }
            }
        }
        ctx.fillRect(this.x, this.y, this.size, this.size);
    }
}

const image = new Image();
image.src = "image.png"; 
image.onload = () => { initParticles(); animate(); };

function initParticles() {
    particlesArray = [];
    const tempCanvas = document.createElement("canvas");
    const tCtx = tempCanvas.getContext("2d");
    tempCanvas.width = width; tempCanvas.height = height;

    const scale = Math.min(width/image.width, height/image.height) * 0.8;
    const iw = image.width * scale, ih = image.height * scale;
    const ox = (width - iw)/2, oy = (height - ih)/2;

    tCtx.drawImage(image, ox, oy, iw, ih);
    const data = tCtx.getImageData(0, 0, width, height).data;

    for (let y = 0; y < height; y += CONFIG.gap) {
        for (let x = 0; x < width; x += CONFIG.gap) {
            const i = (Math.floor(y) * width + Math.floor(x)) * 4;
            if (data[i + 3] > 128) {
                if (particlesArray.length < CONFIG.maxParticles) {
                    particlesArray.push(new Particle(x, y));
                }
            }
        }
    }
}

function animate() {
    ctx.clearRect(0, 0, width, height);
    ctx.fillStyle = "black";
    for (let i = 0; i < particlesArray.length; i++) {
        particlesArray[i].update();
    }
    requestAnimationFrame(animate);
}

window.addEventListener("resize", () => {
    resizeCanvas();
    initParticles();
});
</script>
</body>
</html>
