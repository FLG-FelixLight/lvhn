<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Particle Image Art</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #ffffff;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// Phát hiện thiết bị
const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);

// Cấu hình
const CONFIG = {
    gap: isMobile ? 2 : 1,             // Độ phân giải
    maxParticles: isMobile ? 20000 : 80000,
    mouseRadius: isMobile ? 60 : 90,
    particleSize: isMobile ? 1.2 : 0.8,
    returnSpeed: 0.15
};

// Điều chỉnh độ nét màn hình
const DPR = Math.min(window.devicePixelRatio || 1, 2);

// Thiết lập kích thước canvas
function resizeCanvas() {
    const width = window.innerWidth;
    const height = window.innerHeight;

    canvas.width = width * DPR;
    canvas.height = height * DPR;

    canvas.style.width = width + "px";
    canvas.style.height = height + "px";

    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resizeCanvas();

// Theo dõi chuột và cảm ứng
const mouse = {
    x: null,
    y: null,
    radius: CONFIG.mouseRadius
};

function setMousePosition(x, y) {
    const rect = canvas.getBoundingClientRect();
    mouse.x = x - rect.left;
    mouse.y = y - rect.top;
}

window.addEventListener("mousemove", e => {
    setMousePosition(e.clientX, e.clientY);
});

window.addEventListener("touchmove", e => {
    setMousePosition(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: true });

window.addEventListener("mouseout", () => {
    mouse.x = null;
    mouse.y = null;
});

window.addEventListener("touchend", () => {
    mouse.x = null;
    mouse.y = null;
});

// Lớp Particle
class Particle {
    constructor(x, y) {
        this.baseX = x;
        this.baseY = y;
        this.x = Math.random() * canvas.width / DPR;
        this.y = Math.random() * canvas.height / DPR;
        this.size = CONFIG.particleSize;
        this.vx = (Math.random() - 0.5) * 1;
        this.vy = (Math.random() - 0.5) * 1;
    }

    draw() {
        ctx.fillRect(this.x, this.y, this.size, this.size);
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;

        const maxX = canvas.width / DPR;
        const maxY = canvas.height / DPR;

        if (this.x <= 0 || this.x >= maxX) this.vx *= -1;
        if (this.y <= 0 || this.y >= maxY) this.vy *= -1;

        if (mouse.x !== null && mouse.y !== null) {
            const dxMouse = mouse.x - this.x;
            const dyMouse = mouse.y - this.y;
            const distance = Math.sqrt(dxMouse * dxMouse + dyMouse * dyMouse);

            if (distance < mouse.radius) {
                const dx = this.baseX - this.x;
                const dy = this.baseY - this.y;

                this.x += dx * CONFIG.returnSpeed;
                this.y += dy * CONFIG.returnSpeed;

                this.vx *= 0.9;
                this.vy *= 0.9;
            }
        }

        this.draw();
    }
}

let particlesArray = [];
const image = new Image();
image.src = "image.png";

function initParticles() {
    particlesArray = [];

    const width = canvas.width / DPR;
    const height = canvas.height / DPR;

    const tempCanvas = document.createElement("canvas");
    const tempCtx = tempCanvas.getContext("2d");

    tempCanvas.width = width;
    tempCanvas.height = height;

    // Căn giữa ảnh
    const scale = Math.min(
        width / image.width,
        height / image.height
    ) * 0.8;

    const imgWidth = image.width * scale;
    const imgHeight = image.height * scale;

    const offsetX = (width - imgWidth) / 2;
    const offsetY = (height - imgHeight) / 2;

    tempCtx.drawImage(
        image,
        offsetX,
        offsetY,
        imgWidth,
        imgHeight
    );

    const imageData = tempCtx.getImageData(0, 0, width, height).data;

    for (let y = 0; y < height; y += CONFIG.gap) {
        for (let x = 0; x < width; x += CONFIG.gap) {
            const index = (Math.floor(y) * width + Math.floor(x)) * 4;

            const alpha = imageData[index + 3];
            const brightness = (
                imageData[index] +
                imageData[index + 1] +
                imageData[index + 2]
            ) / 3;

            if (
                alpha > 128 &&
                brightness < 200 &&
                particlesArray.length < CONFIG.maxParticles
            ) {
                particlesArray.push(new Particle(x, y));
            }
        }
    }

    console.log("Particles:", particlesArray.length);
}

image.onload = function () {
    initParticles();
    animate();
};

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "black";

    for (let particle of particlesArray) {
        particle.update();
    }

    requestAnimationFrame(animate);
}

// Cập nhật khi thay đổi kích thước màn hình
window.addEventListener("resize", () => {
    resizeCanvas();
    if (image.complete) {
        initParticles();
    }
});
</script>
</body>
</html>
