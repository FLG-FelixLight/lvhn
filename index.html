<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Particle Image Interaction</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #ffffff;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// Thiết lập kích thước canvas
function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();

// Nhận diện thiết bị
const isMobile = window.innerWidth < 768;

// Cấu hình tối ưu
const CONFIG = {
    gap: isMobile ? 2 : 1.5,        // Mật độ hạt
    maxParticles: isMobile ? 25000 : 70000,
    mouseRadius: isMobile ? 60 : 90,
    particleSize: isMobile ? 1.2 : 0.8,
    returnSpeed: 0.15,
    fps: isMobile ? 30 : 60
};

// Theo dõi chuột và cảm ứng
const mouse = {
    x: null,
    y: null,
    radius: CONFIG.mouseRadius
};

function setMousePosition(x, y) {
    const rect = canvas.getBoundingClientRect();
    mouse.x = x - rect.left;
    mouse.y = y - rect.top;
}

// Chuột
window.addEventListener("mousemove", (e) => {
    setMousePosition(e.clientX, e.clientY);
});

window.addEventListener("mouseout", () => {
    mouse.x = null;
    mouse.y = null;
});

// Cảm ứng
window.addEventListener("touchmove", (e) => {
    setMousePosition(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: true });

window.addEventListener("touchend", () => {
    mouse.x = null;
    mouse.y = null;
});

// Lớp Particle
class Particle {
    constructor(x, y) {
        this.baseX = x;
        this.baseY = y;
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = CONFIG.particleSize;
        this.vx = (Math.random() - 0.5) * 1.2;
        this.vy = (Math.random() - 0.5) * 1.2;
    }

    draw() {
        ctx.fillRect(this.x, this.y, this.size, this.size);
    }

    update() {
        // Di chuyển ngẫu nhiên
        this.x += this.vx;
        this.y += this.vy;

        // Phản xạ khi chạm biên
        if (this.x <= 0 || this.x >= canvas.width) this.vx *= -1;
        if (this.y <= 0 || this.y >= canvas.height) this.vy *= -1;

        // Tương tác với chuột
        if (mouse.x !== null && mouse.y !== null) {
            const dxMouse = mouse.x - this.x;
            const dyMouse = mouse.y - this.y;
            const distance = Math.sqrt(dxMouse * dxMouse + dyMouse * dyMouse);

            if (distance < mouse.radius) {
                const dx = this.baseX - this.x;
                const dy = this.baseY - this.y;

                this.x += dx * CONFIG.returnSpeed;
                this.y += dy * CONFIG.returnSpeed;

                this.vx *= 0.9;
                this.vy *= 0.9;

                // Khóa vào vị trí gốc
                if (Math.abs(dx) < 0.5 && Math.abs(dy) < 0.5) {
                    this.x = this.baseX;
                    this.y = this.baseY;
                }
            }
        }

        this.draw();
    }
}

let particlesArray = [];
const image = new Image();
image.src = "image.png";

function initParticles() {
    particlesArray = [];

    const tempCanvas = document.createElement("canvas");
    const tempCtx = tempCanvas.getContext("2d");

    tempCanvas.width = canvas.width;
    tempCanvas.height = canvas.height;

    // Căn giữa ảnh
    const scale = Math.min(
        canvas.width / image.width,
        canvas.height / image.height
    ) * 0.8;

    const imgWidth = image.width * scale;
    const imgHeight = image.height * scale;

    const offsetX = (canvas.width - imgWidth) / 2;
    const offsetY = (canvas.height - imgHeight) / 2;

    tempCtx.drawImage(
        image,
        offsetX,
        offsetY,
        imgWidth,
        imgHeight
    );

    const imageData = tempCtx.getImageData(
        0,
        0,
        canvas.width,
        canvas.height
    );

    for (let y = 0; y < canvas.height; y += CONFIG.gap) {
        for (let x = 0; x < canvas.width; x += CONFIG.gap) {
            const index = (y * canvas.width + x) * 4;
            const r = imageData.data[index];
            const g = imageData.data[index + 1];
            const b = imageData.data[index + 2];
            const alpha = imageData.data[index + 3];

            const brightness = (r + g + b) / 3;

            if (alpha > 128 && brightness < 200) {
                if (particlesArray.length < CONFIG.maxParticles) {
                    particlesArray.push(new Particle(x, y));
                }
            }
        }
    }

    console.log("Số lượng vật thể:", particlesArray.length);
}

image.onload = function () {
    initParticles();
    animate(0);
};

image.onerror = function () {
    alert("Không tìm thấy file image.png!");
};

// Giới hạn FPS
let lastTime = 0;
function animate(timestamp) {
    requestAnimationFrame(animate);

    if (timestamp - lastTime < 1000 / CONFIG.fps) return;
    lastTime = timestamp;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "black";

    for (let i = 0; i < particlesArray.length; i++) {
        particlesArray[i].update();
    }
}

// Cập nhật khi thay đổi kích thước màn hình
window.addEventListener("resize", () => {
    resizeCanvas();
    if (image.complete) {
        initParticles();
    }
});
</script>
</body>
</html>
