<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Particle Image Mobile Fix</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    * { margin:0; padding:0; box-sizing:border-box; }

    html, body {
        width:100%;
        height:100%;
        overflow:hidden;
        background:#fff;
        touch-action:none;
    }

    canvas { display:block; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);

const CONFIG = {
    gap: isMobile ? 2 : 1,
    maxParticles: isMobile ? 25000 : 90000,
    mouseRadius: isMobile ? 70 : 90,
    particleSize: isMobile ? 1.2 : 0.8,
    returnSpeed: 0.15
};

const DPR = Math.min(window.devicePixelRatio || 1, 2);

let width, height;
let particlesArray = [];

function resizeCanvas() {
    width = window.innerWidth;
    height = window.innerHeight;

    canvas.width = width * DPR;
    canvas.height = height * DPR;

    canvas.style.width = width + "px";
    canvas.style.height = height + "px";

    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resizeCanvas();

// =======================
// MOUSE
// =======================
const mouse = {
    x: null,
    y: null,
    radius: CONFIG.mouseRadius
};

function setMousePosition(x, y) {
    const rect = canvas.getBoundingClientRect();
    mouse.x = x - rect.left;
    mouse.y = y - rect.top;
}

// PC
window.addEventListener("mousemove", e => {
    setMousePosition(e.clientX, e.clientY);
});

window.addEventListener("mouseout", () => {
    mouse.x = null;
    mouse.y = null;
});

// =======================
// 🔥 MOBILE FIX (THRESHOLD)
// =======================
let lastTouchX = null;
let lastTouchY = null;
const MOVE_THRESHOLD = 5; // 🔥 chỉnh tại đây

canvas.addEventListener("touchstart", e => {
    const t = e.touches[0];
    lastTouchX = t.clientX;
    lastTouchY = t.clientY;

    setMousePosition(t.clientX, t.clientY);
}, { passive: true });

canvas.addEventListener("touchmove", e => {
    e.preventDefault();

    const t = e.touches[0];

    const dx = t.clientX - lastTouchX;
    const dy = t.clientY - lastTouchY;

    // 🔥 chỉ update khi di chuyển đủ lớn
    if (Math.abs(dx) > MOVE_THRESHOLD || Math.abs(dy) > MOVE_THRESHOLD) {
        setMousePosition(t.clientX, t.clientY);

        lastTouchX = t.clientX;
        lastTouchY = t.clientY;
    }
}, { passive: false });

canvas.addEventListener("touchend", () => {
    mouse.x = null;
    mouse.y = null;
    lastTouchX = null;
    lastTouchY = null;
});

// =======================
// PARTICLE
// =======================
class Particle {
    constructor(x, y) {
        this.baseX = x;
        this.baseY = y;
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.size = CONFIG.particleSize;
        this.vx = (Math.random() - 0.5) * 0.8;
        this.vy = (Math.random() - 0.5) * 0.8;
        this.fixed = false;
    }

    draw() {
        ctx.fillRect(this.x, this.y, this.size, this.size);
    }

    update() {
        // nếu đã fixed → đứng yên tuyệt đối
        if (this.fixed) {
            this.x = this.baseX;
            this.y = this.baseY;
            this.draw();
            return;
        }

        // random move
        this.x += this.vx;
        this.y += this.vy;

        if (this.x <= 0 || this.x >= width) this.vx *= -1;
        if (this.y <= 0 || this.y >= height) this.vy *= -1;

        // interaction
        if (mouse.x !== null && mouse.y !== null) {
            const dxMouse = mouse.x - this.x;
            const dyMouse = mouse.y - this.y;

            const dist2 = dxMouse * dxMouse + dyMouse * dyMouse;

            if (dist2 < mouse.radius * mouse.radius) {
                const dx = this.baseX - this.x;
                const dy = this.baseY - this.y;

                this.x += dx * CONFIG.returnSpeed;
                this.y += dy * CONFIG.returnSpeed;

                if (Math.abs(dx) < 0.1 && Math.abs(dy) < 0.1) {
                    this.fixed = true;
                    this.x = this.baseX;
                    this.y = this.baseY;
                    this.vx = 0;
                    this.vy = 0;
                }
            }
        }

        this.draw();
    }
}

// =======================
// IMAGE
// =======================
const image = new Image();
image.src = "image.png";

function initParticles() {
    particlesArray = [];

    const tempCanvas = document.createElement("canvas");
    const tempCtx = tempCanvas.getContext("2d");

    tempCanvas.width = width;
    tempCanvas.height = height;

    const scale = Math.min(
        width / image.width,
        height / image.height
    ) * 0.8;

    const imgWidth = image.width * scale;
    const imgHeight = image.height * scale;

    const offsetX = (width - imgWidth) / 2;
    const offsetY = (height - imgHeight) / 2;

    tempCtx.drawImage(image, offsetX, offsetY, imgWidth, imgHeight);

    const imageData = tempCtx.getImageData(0, 0, width, height).data;

    for (let y = 0; y < height; y += CONFIG.gap) {
        for (let x = 0; x < width; x += CONFIG.gap) {
            const index = (y * width + x) * 4;

            const r = imageData[index];
            const g = imageData[index + 1];
            const b = imageData[index + 2];
            const alpha = imageData[index + 3];

            const brightness = (r + g + b) / 3;

            if (
                alpha > 128 &&
                brightness < 200 &&
                particlesArray.length < CONFIG.maxParticles
            ) {
                particlesArray.push(new Particle(x, y));
            }
        }
    }
}

image.onload = () => {
    initParticles();
    animate();
};

image.onerror = () => {
    alert("Không tìm thấy file image.png!");
};

// =======================
// ANIMATE
// =======================
function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "black";

    for (let particle of particlesArray) {
        particle.update();
    }

    requestAnimationFrame(animate);
}

// resize
window.addEventListener("resize", () => {
    resizeCanvas();
    if (image.complete) initParticles();
});
</script>
</body>
</html>
