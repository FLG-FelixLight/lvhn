<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Interactive Particle Image</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #ffffff; }
        canvas { display: block; touch-action: none; }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);

const CONFIG = {
    gap: isMobile ? 2 : 1,
    maxParticles: isMobile ? 25000 : 90000,
    mouseRadius: isMobile ? 70 : 90,
    particleSize: isMobile ? 1.2 : 0.8,
    returnSpeed: 0.12,
    snapDistance: 1.0 
};

const DPR = Math.min(window.devicePixelRatio || 1, 2);
let width, height, particlesArray = [];

function resizeCanvas() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width * DPR;
    canvas.height = height * DPR;
    canvas.style.width = width + "px";
    canvas.style.height = height + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resizeCanvas();

const mouse = { x: null, y: null, radius: CONFIG.mouseRadius };

function setMousePosition(x, y) {
    const rect = canvas.getBoundingClientRect();
    mouse.x = x - rect.left;
    mouse.y = y - rect.top;
}

window.addEventListener("mousemove", e => setMousePosition(e.clientX, e.clientY));
window.addEventListener("mouseout", () => { mouse.x = null; mouse.y = null; });
window.addEventListener("touchmove", e => {
    setMousePosition(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });
window.addEventListener("touchend", () => { mouse.x = null; mouse.y = null; });

class Particle {
    constructor(x, y) {
        this.baseX = x;
        this.baseY = y;
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.size = CONFIG.particleSize;
        this.vx = (Math.random() - 0.5) * 0.8;
        this.vy = (Math.random() - 0.5) * 0.8;
        this.fixed = false;
    }

    update() {
        if (this.fixed) {
            ctx.fillRect(this.baseX, this.baseY, this.size, this.size);
            return;
        }

        // Luôn kiểm tra xem hạt có đang ở rất gần vị trí gốc không để khóa lại
        const dxBase = this.baseX - this.x;
        const dyBase = this.baseY - this.y;
        if (Math.abs(dxBase) < CONFIG.snapDistance && Math.abs(dyBase) < CONFIG.snapDistance) {
            this.x = this.baseX;
            this.y = this.baseY;
            this.fixed = true;
            ctx.fillRect(this.baseX, this.baseY, this.size, this.size);
            return;
        }

        if (mouse.x !== null && mouse.y !== null) {
            const dxMouse = mouse.x - this.x;
            const dyMouse = mouse.y - this.y;
            if (Math.sqrt(dxMouse * dxMouse + dyMouse * dyMouse) < mouse.radius) {
                this.x += dxBase * CONFIG.returnSpeed;
                this.y += dyBase * CONFIG.returnSpeed;
            } else {
                this.x += this.vx;
                this.y += this.vy;
            }
        } else {
            this.x += this.vx;
            this.y += this.vy;
        }

        if (this.x <= 0 || this.x >= width) this.vx *= -1;
        if (this.y <= 0 || this.y >= height) this.vy *= -1;

        ctx.fillRect(this.x, this.y, this.size, this.size);
    }
}

const image = new Image();
image.src = "image.png";
image.onload = () => { initParticles(); animate(); };

function initParticles() {
    particlesArray = [];
    const tempCanvas = document.createElement("canvas");
    const tempCtx = tempCanvas.getContext("2d");
    tempCanvas.width = width;
    tempCanvas.height = height;
    const scale = Math.min(width / image.width, height / image.height) * 0.8;
    const iw = image.width * scale, ih = image.height * scale;
    tempCtx.drawImage(image, (width - iw) / 2, (height - ih) / 2, iw, ih);
    const data = tempCtx.getImageData(0, 0, width, height).data;

    for (let y = 0; y < height; y += CONFIG.gap) {
        for (let x = 0; x < width; x += CONFIG.gap) {
            const i = (Math.floor(y) * width + Math.floor(x)) * 4;
            if (data[i + 3] > 128 && (data[i] + data[i+1] + data[i+2])/3 < 200) {
                if (particlesArray.length < CONFIG.maxParticles) particlesArray.push(new Particle(x, y));
            }
        }
    }
}

function animate() {
    ctx.clearRect(0, 0, width, height);
    ctx.fillStyle = "black";
    for (let p of particlesArray) p.update();
    requestAnimationFrame(animate);
}

window.addEventListener("resize", () => { resizeCanvas(); if (image.complete) initParticles(); });
</script>
</body>
</html>
